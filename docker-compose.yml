x-airflow-common: &airflow-common
  build: .
  image: crypto-airflow:3.1.4
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__API__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
    AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: 8793
    PYTHONPATH: /opt/airflow
    PIP_REQUIREMENTS: /requirements.txt
    TZ: Asia/Kolkata
    #_PIP_ADDITIONAL_REQUIREMENTS: "pyspark==3.5.1 scikit-learn requests apache-airflow-providers-fab"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./requirements.txt:/requirements.txt
    - ./jars:/opt/airflow/jars

  depends_on:
    - postgres

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true"
    restart: "no"

  # airflow-scheduler:
  #   <<: *airflow-common
  #   command: airflow scheduler
  #   ports:
  #   - "4040:4040"
  #   depends_on:
  #     airflow-init:
  #       condition: service_completed_successfully

  airflow-api-server:
    <<: *airflow-common
    command: >
      bash -c " airflow db migrate && airflow scheduler & airflow serve-logs & airflow api-server "
    ports:
      - "8080:8080"
      - "4040:4040"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    depends_on:
      - airflow-api-server

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: crypto-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app/streamlit_app
      - ./src:/app/src
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata

  api:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: crypto-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./src:/app/src
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl:latest
    container_name: ollama-init
    depends_on:
      - ollama
    command: >
      sh -c "
        echo 'Waiting for Ollama to start...' &&
        while ! curl -s http://ollama:11434/api/tags >/dev/null; do sleep 2; done &&
        echo 'Pulling llama3.2 model...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3.2\"}' &&
        echo 'Model pulled successfully!'
      "
    restart: "no"

volumes:
  postgres-db-volume:
  ollama_data:
