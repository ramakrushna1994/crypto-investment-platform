x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ai_quant:ai_quant@postgres:5432/ai_quant
  AIRFLOW__API__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
  AIRFLOW__API__SECRET_KEY: "local-dev-secret-key"
  AIRFLOW__WEBSERVER__SECRET_KEY: "local-dev-secret-key"
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
  AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
  AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: 8793
  PYTHONPATH: /opt/airflow
  PIP_REQUIREMENTS: /requirements.txt
  TZ: Asia/Kolkata

x-airflow-common: &airflow-common
  build: .
  image: ai-quant-airflow:3.1.4
  # env_file: .env
  environment: *airflow-env

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./requirements.txt:/requirements.txt
    - ./jars:/opt/airflow/jars
    - ./files:/opt/airflow/files

  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: ai-quant-postgres
    environment:
      POSTGRES_USER: ai_quant
      POSTGRES_PASSWORD: ai_quant
      POSTGRES_DB: ai_quant
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ai_quant -d ai_quant" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  airflow-init:
    <<: *airflow-common
    container_name: ai-quant-airflow-init
    command: >
      bash -c "until pg_isready -h postgres -p 5432; do sleep 2; done && psql -h postgres -U ai_quant -d ai_quant -c 'CREATE SCHEMA IF NOT EXISTS airflow; CREATE SCHEMA IF NOT EXISTS bronze; CREATE SCHEMA IF NOT EXISTS silver; CREATE SCHEMA IF NOT EXISTS gold;' && airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true"
    environment:
      <<: *airflow-env
      PGPASSWORD: ai_quant
    restart: "no"

  airflow-api-server:
    <<: *airflow-common
    container_name: ai-quant-airflow-api-server
    command: >
      bash -c "airflow scheduler & airflow api-server"
    ports:
      - "8080:8080"
      - "4040:4040"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 6g
    memswap_limit: 6g
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  airflow-dag-processor:
    <<: *airflow-common
    container_name: ai-quant-dag-processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: on-failure:5

  airflow-triggerer:
    <<: *airflow-common
    container_name: ai-quant-airflow-triggerer
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: on-failure:5

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ai-quant-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app/streamlit_app
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: ai-quant-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./src:/app/src
      - ./files:/opt/airflow/files
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: ai-quant-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ollama-init:
    image: curlimages/curl:latest
    container_name: ai-quant-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for Ollama to start...' &&
        while ! curl -s http://ollama:11434/api/tags >/dev/null; do sleep 2; done &&
        echo 'Pulling llama3.2 model...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3.2\"}' &&
        echo 'Model pulled successfully!'
      "
    restart: "no"

volumes:
  postgres-db-volume:
  ollama_data:
